<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TanniStore - Cart</title>

<link rel="stylesheet" href="css/style.css">

<style>
.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    margin-bottom:15px;
    background:#fff;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.product-name{
    font-size:18px;
    font-weight:bold;
}

.product-price{
    color:green;
    font-weight:bold;
}

.remove-btn{
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}

.total-box{
    margin-top:25px;
    text-align:right;
    font-size:22px;
    font-weight:bold;
}

.checkout-btn{
    margin-top:15px;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}
</style>

</head>
<body>

<div class="container">

<h1>🛒 Shopping Cart</h1>

<div id="cartItems">

<div class="cart-item">
<div>
<div class="product-name">Classic T-Shirt</div>
<div class="product-price">₹499</div>
</div>

<button class="remove-btn">Remove</button>
</div>

<div class="cart-item">
<div>
<div class="product-name">Running Shoes</div>
<div class="product-price">₹1999</div>
</div>

<button class="remove-btn">Remove</button>
</div>

</div>

<div class="total-box">
Total: ₹2498
</div>

<div style="text-align:right;">
<button class="checkout-btn">
Proceed To Checkout
</button>
</div>

</div>

</body>
  </html>
