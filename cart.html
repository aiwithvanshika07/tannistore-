<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TanniStore - Cart</title>

<link rel="stylesheet" href="css/style.css">

<style>

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    margin-bottom:15px;
    background:#fff;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.product-name{
    font-size:18px;
    font-weight:bold;
}

.product-price{
    color:green;
    font-weight:bold;
}

.remove-btn{
    border:none;
    padding:8px 12px;
    border-radius:6px;
    background:red;
    color:white;
    cursor:pointer;
}

.total-box{
    margin-top:25px;
    text-align:right;
    font-size:22px;
    font-weight:bold;
}

.checkout-btn{
    margin-top:15px;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:green;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.empty{
    text-align:center;
    margin-top:40px;
    font-size:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>🛒 Shopping Cart</h1>

<div id="cartItems"></div>

<div class="total-box" id="totalBox">
Total: ₹0
</div>

<div style="text-align:right;">
<button class="checkout-btn">
Proceed To Checkout
</button>
</div>

</div>

<script>

let cart =
JSON.parse(localStorage.getItem("cartItems")) || [];

let cartItems =
document.getElementById("cartItems");

let total = 0;

function renderCart(){

cartItems.innerHTML = "";

total = 0;

if(cart.length === 0){

cartItems.innerHTML =
"<p class='empty'>Your Cart Is Empty 🛒</p>";

document.getElementById("totalBox").innerHTML =
"Total: ₹0";

return;

}

cart.forEach((item,index)=>{

let price =
parseInt(
item.price.replace(/[^\d]/g,'')
) || 0;

total += price;

cartItems.innerHTML += `

<div class="cart-item">

<div>

<div class="product-name">
${item.name}
</div>

<div class="product-price">
${item.price}
</div>

</div>

<button
class="remove-btn"
onclick="removeItem(${index})">

Remove

</button>

</div>

`;

});

document.getElementById("totalBox").innerHTML =
"Total: ₹" + total;

}

function removeItem(index){

cart.splice(index,1);

localStorage.setItem(
"cartItems",
JSON.stringify(cart)
);

localStorage.setItem(
"cartCount",
cart.length
);

renderCart();

}

renderCart();

</script>

</body>
</html>
